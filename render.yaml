# Deploy on Render: https://render.com
# New → Blueprint → connect repo with this file
services:
  - type: web
    name: leadops-outreach-automator
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
